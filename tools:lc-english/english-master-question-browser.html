<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LC English — Master Question Browser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#FF0000;
    --acc:#FF0000;
    --ink:#111111;
    --paper:#f6f4ef;
    --card:#ffffff;
    --line:#e4e0d8;
    --muted:#6b6760;
    --done:#1f9d55;
    --shadow:0 1px 0 rgba(0,0,0,.04), 0 10px 30px -18px rgba(0,0,0,.35);
    --font:'Poppins',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;font-family:var(--font);color:var(--ink);background:var(--paper);
    background-image:linear-gradient(90deg, rgba(255,0,0,.02) 0 1px, transparent 1px);
    background-size:34px 100%;line-height:1.5;
  }

  /* ---------- Masthead ---------- */
  .masthead{background:var(--ink);color:#fff;padding:28px 22px 0;position:relative;overflow:hidden;}
  .masthead::after{content:"";position:absolute;left:0;right:0;bottom:0;height:6px;background:var(--acc);transition:background .25s;}
  .mast-inner{max-width:1080px;margin:0 auto;padding-bottom:22px;}
  .eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--acc);font-weight:700;margin:0 0 10px;transition:color .25s;}
  .masthead h1{margin:0;font-weight:800;letter-spacing:-.02em;font-size:clamp(26px,5vw,46px);line-height:1.04;}
  .masthead h1 em{font-style:normal;color:var(--acc);transition:color .25s;}
  .sub{margin:12px 0 0;color:#bdbab4;max-width:64ch;font-size:15px;}
  .counts{display:flex;flex-wrap:wrap;gap:26px;margin-top:20px;}
  .counts .stat{display:flex;align-items:baseline;gap:8px;}
  .counts .num{font-size:24px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;}
  .counts .lab{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#8d8a84;font-weight:600;}

  /* ---------- Section switcher ---------- */
  .sectionsw{display:flex;gap:8px;flex-wrap:wrap;margin-top:22px;}
  .sectionsw button{appearance:none;border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.04);
    color:#cdcac4;font:inherit;font-weight:600;font-size:13.5px;padding:9px 16px;border-radius:10px;cursor:pointer;
    display:inline-flex;align-items:center;gap:9px;transition:transform .08s,border-color .15s,background .15s,color .15s;}
  .sectionsw button:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.4);color:#fff;}
  .sectionsw button .swdot{width:9px;height:9px;border-radius:50%;flex:none;background:#888;}
  .sectionsw button .swtag{font-size:11px;font-weight:700;background:rgba(255,255,255,.12);border-radius:999px;padding:1px 8px;color:#e7e5e1;}
  .sectionsw button[aria-pressed="true"]{background:#fff;border-color:#fff;color:var(--ink);}
  .sectionsw button[aria-pressed="true"] .swtag{background:rgba(0,0,0,.08);color:var(--ink);}

  /* ---------- Controls ---------- */
  .controls{background:rgba(246,244,239,.94);border-bottom:1px solid var(--line);}
  .controls-inner{max-width:1080px;margin:0 auto;padding:14px 22px;}
  .searchrow{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .search{flex:1 1 260px;position:relative;min-width:0;}
  .search input{width:100%;padding:12px 14px 12px 40px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font:inherit;font-size:15px;transition:border-color .15s, box-shadow .15s;}
  .search input:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(255,0,0,.12);}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.45;}

  .poets{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .poet-pill{appearance:none;border:1.5px solid var(--line);background:#fff;font:inherit;font-weight:600;font-size:13px;color:var(--ink);padding:7px 13px;border-radius:999px;cursor:pointer;display:inline-flex;gap:8px;align-items:center;transition:transform .08s, border-color .15s, background .15s, color .15s;}
  .poet-pill:hover{border-color:#bcb8b0;transform:translateY(-1px);}
  .poet-pill .gdot{width:9px;height:9px;border-radius:50%;flex:none;}
  .poet-pill[aria-pressed="true"]{background:var(--ink);border-color:var(--ink);color:#fff;}
  .poet-pill[aria-pressed="true"] .gdot{box-shadow:0 0 0 2px rgba(255,255,255,.5);}
  .poet-pill .tag{font-size:11px;font-weight:700;background:rgba(0,0,0,.06);border-radius:999px;padding:1px 7px;color:var(--muted);}
  .poet-pill[aria-pressed="true"] .tag{background:rgba(255,255,255,.22);color:#fff;}
  .poet-pill.allpill[aria-pressed="true"]{background:var(--acc);border-color:var(--acc);}
  .poet-pill.other{border-style:dashed;}

  /* group dropdown filter (within a section) */
  .groupwrap{display:flex;align-items:center;gap:11px;margin-top:14px;flex-wrap:wrap;}
  .groupwrap .glabel{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
  .gselect{position:relative;display:inline-flex;align-items:center;}
  .gselect select{appearance:none;-webkit-appearance:none;font:inherit;font-weight:600;font-size:14px;color:var(--ink);background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:10px 42px 10px 15px;cursor:pointer;min-width:248px;max-width:100%;transition:border-color .15s, box-shadow .15s, transform .08s;}
  .gselect select:hover{border-color:#bcb8b0;transform:translateY(-1px);}
  .gselect select:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 3px rgba(0,0,0,.07);}
  .gselect[data-active="true"] select{border-color:var(--acc);color:var(--acc);}
  .gselect::after{content:"";position:absolute;right:16px;top:50%;width:8px;height:8px;border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);transform:translateY(-70%) rotate(45deg);pointer-events:none;}

  /* extras row (poetry other-poets switch) */
  .extras{margin-top:11px;}
  .extras[hidden]{display:none;}
  .switch{display:inline-flex;align-items:center;gap:10px;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:6px 12px;cursor:pointer;font:inherit;}
  .switch .track{width:38px;height:22px;border-radius:999px;background:#d8d3ca;position:relative;transition:background .15s;flex:none;}
  .switch .track::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:transform .15s;}
  .switch[aria-pressed="true"] .track{background:var(--acc);}
  .switch[aria-pressed="true"] .track::after{transform:translateX(16px);}
  .switch .swlabel{display:flex;flex-direction:column;line-height:1.15;text-align:left;}
  .switch .lbl{font-size:13px;font-weight:600;color:var(--ink);}
  .switch .hint{font-size:10.5px;color:var(--muted);font-weight:500;letter-spacing:.02em;}

  /* themes bar */
  .themes-wrap{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);position:relative;}
  .themes-wrap[hidden]{display:none;}
  .themes-toggle{appearance:none;border:1.5px solid var(--line);background:#fff;font:inherit;font-size:12px;font-weight:600;color:var(--ink);padding:6px 12px;border-radius:8px;cursor:pointer;display:inline-flex;gap:8px;align-items:center;}
  .themes-toggle:hover{border-color:#bcb8b0;}
  .themes-toggle[aria-expanded="true"]{border-color:var(--ink);}
  .themes-toggle .chev{transition:transform .15s;font-size:10px;}
  .themes-toggle[aria-expanded="true"] .chev{transform:rotate(180deg);}
  .themes-toggle .tcount{background:#ffe39b;color:#5c4a00;border-radius:999px;padding:0 7px;font-size:11px;font-weight:700;}
  .themes{display:flex;gap:7px;flex-wrap:wrap;position:absolute;top:calc(100% + 6px);left:0;z-index:25;background:#fff;border:1.5px solid var(--line);border-radius:12px;box-shadow:0 14px 36px -16px rgba(0,0,0,.45);padding:12px;max-width:min(620px,92vw);}
  .themes[hidden]{display:none;}
  .theme-chip{appearance:none;border:1.5px solid var(--line);background:#fff;font:inherit;font-size:12px;font-weight:600;color:var(--muted);padding:5px 11px;border-radius:8px;cursor:pointer;display:inline-flex;gap:6px;align-items:center;transition:transform .08s,border-color .15s,background .15s,color .15s;}
  .theme-chip:hover{transform:translateY(-1px);border-color:#bcb8b0;color:var(--ink);}
  .theme-chip[aria-pressed="true"]{background:#ffe39b;border-color:#e6b800;color:#5c4a00;}
  .theme-chip .n{font-size:10.5px;font-weight:700;opacity:.7;}

  /* ---------- Toolbar ---------- */
  .toolbar{max-width:1080px;margin:0 auto;padding:18px 22px 0;display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between;}
  .tools-left,.tools-right{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn{appearance:none;border:1.5px solid var(--ink);background:#fff;font:inherit;font-weight:600;font-size:13px;color:var(--ink);padding:9px 14px;border-radius:10px;cursor:pointer;display:inline-flex;gap:8px;align-items:center;transition:transform .08s, background .15s, color .15s;}
  .btn:hover{transform:translateY(-1px);}
  .btn[hidden]{display:none;}
  .btn.primary{background:var(--acc);border-color:var(--acc);color:#fff;}
  .btn.ghost{border-color:var(--line);color:var(--muted);}

  .seg-sort{display:inline-flex;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:3px;}
  .seg-sort button{appearance:none;border:0;background:transparent;font:inherit;font-weight:600;font-size:12.5px;padding:7px 12px;border-radius:7px;cursor:pointer;color:var(--muted);}
  .seg-sort button[aria-pressed="true"]{background:var(--ink);color:#fff;}

  /* timer */
  .timer{display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:5px 6px 5px 12px;}
  .timer[hidden]{display:none;}
  .timer .clock{font-weight:700;font-variant-numeric:tabular-nums;font-size:15px;letter-spacing:.02em;min-width:60px;text-align:center;}
  .timer.low .clock{color:var(--red);}
  .timer .mini{appearance:none;border:0;background:var(--ink);color:#fff;width:30px;height:30px;border-radius:7px;font:inherit;font-size:15px;cursor:pointer;display:grid;place-items:center;}
  .timer .mini.alt{background:#fff;color:var(--ink);border:1.5px solid var(--line);}
  .timerhint{font-size:10.5px;color:var(--muted);font-weight:600;letter-spacing:.04em;align-self:center;line-height:1.2;}

  /* ---------- Trackers ---------- */
  .tracker-panel{max-width:1080px;margin:16px auto 0;padding:0 22px;}
  .tracker-panel[hidden]{display:none;}
  .tracker-inner{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 18px 12px;box-shadow:var(--shadow);}
  .tracker-inner h3{margin:0 0 4px;font-size:16px;font-weight:700;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .tracker-inner h3 .tnote{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .tlegend{font-size:11.5px;color:var(--muted);margin:0 0 14px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-weight:500;}
  .tlegend .key{width:12px;height:12px;border-radius:3px;display:inline-block;vertical-align:-1px;margin-right:5px;}
  .tlegend .key.app{background:var(--acc);}
  .tlegend .key.pres{background:#d8d3ca;}
  .tlegend .key.off{background:#fff;border:1px solid var(--line);}
  .tinsight{font-size:12.5px;color:#33302b;background:#fff7e6;border:1px solid #f0dba8;border-radius:10px;padding:9px 12px;margin:0 0 14px;font-weight:500;}
  .tinsight[hidden]{display:none;}
  .tinsight b{color:var(--ink);}
  .tgrid{overflow-x:auto;}
  .trow{align-items:center;gap:3px;padding:4px 0;border-top:1px solid #f1eee8;}
  .trow.head{border-top:0;font-size:9.5px;letter-spacing:.02em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .trow .pname{font-weight:600;font-size:12.5px;white-space:nowrap;display:flex;align-items:center;gap:7px;}
  .trow .pname .gdot{width:9px;height:9px;border-radius:50%;flex:none;}
  .trow .pstat{font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap;}
  .trow .pstat b{color:var(--ink);}
  .trow .pstat.every b,.trow .pstat.due b{color:var(--acc);}
  .tcell{height:22px;border-radius:3px;background:#f3f1ec;display:grid;place-items:center;font-size:10.5px;font-weight:700;color:#fff;}
  .tcell.app{background:var(--acc);}
  .tcell.pres{background:#d8d3ca;}
  .trow.head .tcell{background:none;height:auto;color:var(--muted);}

  /* ---------- Overview decks (All mode) ---------- */
  main{max-width:1080px;margin:0 auto;padding:18px 22px 80px;}
  .deckrow{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:6px 0 26px;}
  .deckrow[hidden]{display:none;}
  .deck{appearance:none;text-align:left;border:1px solid var(--line);background:var(--card);border-radius:16px;padding:18px 18px 16px;box-shadow:var(--shadow);cursor:pointer;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden;transition:transform .1s,box-shadow .1s,border-color .1s;}
  .deck::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--dc);}
  .deck:hover{transform:translateY(-3px);box-shadow:0 1px 0 rgba(0,0,0,.04),0 20px 44px -22px rgba(0,0,0,.5);border-color:#d6d2c9;}
  .deck .dpaper{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--dc);}
  .deck .dtitle{font-size:19px;font-weight:700;letter-spacing:-.01em;margin:0;line-height:1.1;}
  .deck .ddesc{font-size:12.5px;color:var(--muted);font-weight:500;line-height:1.5;flex:1;}
  .deck .dfoot{display:flex;align-items:center;justify-content:space-between;margin-top:4px;}
  .deck .dcount{font-size:12px;font-weight:700;color:var(--ink);}
  .deck .dcount b{color:var(--dc);font-size:18px;}
  .deck .dgo{font-size:12px;font-weight:700;color:var(--dc);display:inline-flex;align-items:center;gap:4px;}

  /* ---------- Results ---------- */
  .resultline{font-size:12px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;margin:8px 2px 18px;font-weight:600;}
  .resultline b{color:var(--ink);}

  .poet-group{margin-bottom:40px;scroll-margin-top:120px;}
  .group-head{display:flex;align-items:center;gap:14px;margin:0 0 6px;}
  .group-head h2{margin:0;font-size:clamp(19px,3vw,24px);font-weight:700;letter-spacing:-.01em;white-space:nowrap;}
  .group-head .rule{flex:1;height:2px;background:linear-gradient(90deg,var(--gc,var(--ink)),transparent);}
  .group-head .cnt{font-size:12px;font-weight:700;color:#fff;border-radius:999px;padding:3px 10px;background:var(--gc,var(--ink));}
  .group-desc{font-size:12.5px;color:var(--muted);margin:0 0 16px;font-weight:500;letter-spacing:.01em;}

  /* section band (All mode) */
  .secband{display:flex;align-items:center;gap:14px;margin:0 0 16px;padding:14px 16px;border-radius:14px;background:var(--card);border:1px solid var(--line);border-left:6px solid var(--sc);box-shadow:var(--shadow);}
  .secband h2{margin:0;font-size:20px;font-weight:800;letter-spacing:-.01em;}
  .secband .meta{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .secband .cnt{margin-left:auto;font-size:12px;font-weight:700;color:#fff;border-radius:999px;padding:4px 12px;background:var(--sc);}
  .sec-group{margin-bottom:40px;scroll-margin-top:120px;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

  .qcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:0;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;transition:transform .1s ease, box-shadow .1s ease, border-color .1s;}
  .qcard:hover{transform:translateY(-2px);box-shadow:0 1px 0 rgba(0,0,0,.04),0 18px 40px -20px rgba(0,0,0,.45);border-color:#d6d2c9;}
  .qcard.is-done{border-color:#bfe3c9;}
  .qcard.is-done .top{background:#f3fbf5;}

  .qcard .top{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px dashed var(--line);gap:8px;}
  .stamp{font-weight:700;font-size:14px;letter-spacing:.02em;font-variant-numeric:tabular-nums;}
  .toptags{display:inline-flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
  .badge{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:999px;border:1.5px solid;white-space:nowrap;}
  .badge.exam{color:#1f9d55;border-color:#bfe3c9;background:#f1faf4;}
  .badge.mock{color:#b45309;border-color:#f0d9b5;background:#fdf6ec;}
  .badge.other{color:var(--muted);border-color:var(--line);background:#fafafa;}

  .qcard .body{padding:15px 16px;display:flex;flex-direction:column;gap:9px;flex:1;}
  .ptitle{margin:0;font-weight:700;font-size:15px;line-height:1.35;color:var(--ink);}
  .instr{font-size:13.5px;color:#4a4640;line-height:1.55;margin:0;}
  .quote{font-style:italic;font-weight:500;color:var(--ink);border-left:3px solid var(--acc);padding-left:12px;font-size:14.5px;line-height:1.45;margin:0;}
  mark{background:#ffe39b;color:inherit;padding:0 1px;border-radius:2px;}

  .qcard .foot{margin-top:auto;padding:9px 12px 9px 16px;background:#fafafa;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;justify-content:space-between;}
  .foot .who{font-size:11px;letter-spacing:.03em;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px;min-width:0;}
  .foot .who .dot{width:7px;height:7px;border-radius:50%;flex:none;}
  .foot .acts{display:flex;gap:6px;flex:none;flex-wrap:wrap;}
  .icbtn{appearance:none;border:1.5px solid var(--line);background:#fff;border-radius:8px;font:inherit;font-size:12px;font-weight:600;color:var(--muted);padding:6px 10px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s,color .15s,border-color .15s;}
  .icbtn:hover{border-color:#c7c2b9;color:var(--ink);}
  .icbtn.done{border-color:var(--done);color:#fff;background:var(--done);}
  .icbtn.plan{border-color:var(--acc);color:var(--acc);font-weight:700;}
  .icbtn.plan:hover{background:var(--acc);color:#fff;border-color:var(--acc);}
  .icbtn svg{width:14px;height:14px;}
  .icbtn.study-toggle[aria-expanded="true"]{background:var(--ink);color:#fff;border-color:var(--ink);}

  /* study help */
  @keyframes slidein{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:none;}}
  .study{border-top:1px dashed var(--line);margin-top:2px;padding-top:12px;display:none;}
  .study.open{display:block;animation:slidein .2s ease;}
  .ssec{margin-bottom:13px;}
  .ssec:last-child{margin-bottom:2px;}
  .ssec h4{margin:0 0 7px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);font-weight:700;}
  .squotes,.sscheme,.spoems{margin:0;padding-left:18px;}
  .squotes li,.sscheme li,.spoems li{font-size:13px;line-height:1.5;color:#33302b;margin-bottom:6px;}
  .squotes li::marker,.sscheme li::marker,.spoems li::marker{color:var(--acc);}
  .spoems a{color:var(--acc);font-weight:600;text-decoration:none;border-bottom:1px solid rgba(255,0,0,.3);}
  .spoems a:hover{border-bottom-color:var(--acc);}
  .sask{font-size:13px;line-height:1.55;color:#33302b;margin:0;}
  .pclm{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;}
  .pclm .pc{font-size:11px;font-weight:700;border:1.5px solid var(--line);border-radius:8px;padding:5px 9px;color:#33302b;background:#fff;}
  .pclm .pc b{color:var(--acc);}

  .empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty strong{display:block;color:var(--ink);font-size:18px;margin-bottom:6px;}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;z-index:50;box-shadow:0 12px 30px -10px rgba(0,0,0,.5);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  footer.site{border-top:1px solid var(--line);padding:24px 22px;text-align:center;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  footer.site b{color:var(--red);}

  @media (max-width:820px){.deckrow{grid-template-columns:1fr;}}
  @media (max-width:760px){.grid{grid-template-columns:1fr;}}
  @media (max-width:560px){.counts{gap:16px;}.toolbar{flex-direction:column;align-items:stretch;}.tools-right{justify-content:space-between;}}

const QB_Q = [
  {id:1, genre:"Speech / Talk", marks:50, title:"Pre-match team-talk \u2014 captain of the underdog school team", statement:"", prompt:"You are the captain of a school's sports team, about to compete, as the underdogs, in the final of a national competition and you are required to give the pre-match team-talk. Write the text of the talk that you would deliver. In your talk you should: outline to your team mates aspects of the game plan you have decided to employ on the field, remind them of the strengths and weaknesses of your opponents, and motivate them to overcome the odds and to achieve victory.", year:"2025", type:"Exam"},
  {id:2, genre:"Blog / Online", marks:50, title:"Hotel manager's online response to a critical review", statement:"", prompt:"You are a hotel manager. A recent, disgruntled guest has left a highly critical review of your hotel and its facilities on a travel-review website. You decide to challenge this person's views with an online response on the same website. In your response you should: outline the proud tradition and history of your establishment, challenge the specific criticisms of the guest reviewer, and encourage the reviewer to return by highlighting some of the exciting upcoming events in your hotel and its locality.", year:"2025", type:"Exam"},
  {id:3, genre:"Radio / Podcast", marks:50, title:"Podcast reflection \u2014 Eyes Wide Open (a changed perspective)", statement:"Eyes Wide Open", prompt:"You are a contributor to a podcast entitled, Eyes Wide Open, where you reflect on how your perspective on a significant issue changed as a result of an experience or an encounter. Write your reflection for the podcast in which you: identify the issue and explain your previous attitude towards it, describe the experience or encounter that changed your perspective, and consider some of the life lessons that you and others can learn from this reflection.", year:"2025", type:"Exam"},
  {id:4, genre:"Dialogue / Interview", marks:50, title:"Dialogue \u2014 an adult and a young person, opposing views", statement:"", prompt:"In TEXT 1 Fintan O'Toole refers to how different generations can have differing views on issues. Write the text of a dialogue between an adult and a young person who have opposing viewpoints about a contentious issue of your choice. In the dialogue you should: develop the arguments of both sides, and conclude the dialogue in a convincing manner, with one side conceding to the other in some way.", year:"2024", type:"Exam"},
  {id:5, genre:"Proposal", marks:50, title:"Proposal to your local Tidy Towns Committee", statement:"", prompt:"Certain aspects of the area where you live have become run down and neglected. Write a proposal to your local Tidy Towns Committee in which you: outline your key concerns in relation to the problems you have identified, propose a project that you believe would improve the situation, and suggest how the committee could encourage more members of the local community to become active in improving the local area.", year:"2024", type:"Exam"},
  {id:6, genre:"Diary / Reflection", marks:50, title:"Reflective diary entries \u2014 returning home after a year travelling", statement:"", prompt:"Write a series of reflective diary entries of a person returning to their homeplace after travelling for a whole year in different countries. In your diary you should: consider your feelings on returning home, recall and analyse some significant moments and events that stand out for you from your travels, and reflect on how the experience of travel has influenced your overall worldview now.", year:"2024", type:"Exam"},
  {id:7, genre:"Letter", marks:50, title:"Personal letter \u2014 as Salim, a year in London, to your mother", statement:"", prompt:"Imagine you are Salim and you have been in London for over a year. Write a new personal letter to your mother in which you: describe a number of experiences you have had that you believe will fascinate your mother, reflect on both the positive and negative insights you have gained into human nature as an outsider in London, and consider some of the ways you believe your experience in this city has altered you as a person.", year:"2023", type:"Exam"},
  {id:8, genre:"Diary / Reflection", marks:50, title:"Personal reflection (history magazine) \u2014 a place of historic interest", statement:"", prompt:"You have been asked to write a personal reflection for an educational history magazine. The reflection should recall an experience you had of visiting a place of historic interest. In the reflection you should: outline the expectations you had before your visit to the place of historic interest, describe some of the thoughts and feelings you had in response to this place during the visit, and argue the case for making trips to historic places compulsory for students in Irish schools today.", year:"2023", type:"Exam"},
  {id:9, genre:"Article", marks:50, title:"School website article \u2014 the growing role of technology in schools", statement:"", prompt:"It is Science Week and you have been asked to write an article for your school's website about the increasing role played by technology in schools. In your article you should: describe some of the positive ways technology is utilised in schools today, discuss whether or not, in your view, technology can be a negative influence in schools, and speculate about the role you think technology will play in schools in the future. Your article may be serious or humorous or both.", year:"2023", type:"Exam"},
  {id:10, genre:"Letter", marks:40, title:"Open letter \u2014 poetry: optional or compulsory in the LC?", statement:"", prompt:"Some students believe that the study of poetry should be an optional rather than a compulsory element of the Leaving Certificate English course. Write an open letter, to be published on a popular social media platform, to encourage discussion on this topic. In your open letter you should: explain what, if any, value you found in the study of poetry as part of your Leaving Certificate English course, explore the reasons why you think the study of poetry should be an optional or a compulsory element of Leaving Certificate English in the future, and seek to anticipate and refute views that might potentially be offered in opposition to your chosen stance.", year:"2022", type:"Exam"},
  {id:11, genre:"Radio / Podcast", marks:40, title:"Podcast \u2014 The Music Playing in Me", statement:"The Music Playing in Me", prompt:"You have been invited to contribute to a podcast series entitled, The Music Playing in Me. The series will explore the importance of music in the lives of individuals. Write the text for the podcast in which you: reflect on the importance of music in your life, discuss some of the particular pieces of music (songs, albums, etc.) that make up the soundtrack to your own life, and share the thoughts and feelings this music evokes in you.", year:"2022", type:"Exam"},
  {id:12, genre:"Article", marks:40, title:"Newspaper editorial \u2014 a book-burning in 2033", statement:"", prompt:"It is 2033 and you are the editor of an internationally distributed newspaper. A book burning event, similar to that described in TEXT 3, has occurred in a major American city. You believe that respect for books of all kinds is vital to democracy and are horrified by this assault on them. Write an editorial in which you: give your response to this incident, warn your readers of the dangers inherent in attacking books in this way, and urge them to engage in peaceful protest against this and any other form of censorship.", year:"2022", type:"Exam"},
  {id:13, genre:"Article", marks:40, title:"Feature article \u2014 Monumental Matters: The Story of Statues", statement:"Monumental Matters \u2013 The Story of Statues", prompt:"You have been invited to write a feature article, entitled Monumental Matters \u2013 The Story of Statues, to appear in the magazine supplement of a weekend newspaper. In your article you should: reflect on the long-established tradition of erecting statues to celebrate or memorialise people, explore some of the reasons why commemorative statues may be controversial, and give your views on continuing this tradition into the future.", year:"2021", type:"Exam"},
  {id:14, genre:"Letter", marks:40, title:"Open letter (social media) \u2014 animal rights", statement:"", prompt:"An assertion that other creatures' lives are somehow lesser than human life has prompted extensive debate on social media. In order to join in this online debate, write an open letter to be shared on social media, in which you: state your position in relation to animal rights, explore some of the issues associated with our current engagement with animals, and outline what you see as the major challenges we face as we share the planet with animals in the future.", year:"2021", type:"Exam"},
  {id:15, genre:"Speech / Talk", marks:40, title:"Verbal pitch to the graduation committee \u2014 Yearbook editor", statement:"", prompt:"You have decided to apply for the position of editor of your school's Graduation Yearbook. Each year, the Yearbook has a different theme, chosen by the editor. An article by a celebrity contributor is also included annually. To be considered for the post, you must make a verbal pitch (a spoken promotional presentation) to the graduation committee members in which you: promote your preferred theme for the 2021 Graduation Yearbook, impress the committee with your ideas for its content, and nominate your ideal celebrity contributor, explaining your choice to the committee members. Write the text for the verbal pitch that you would make.", year:"2021", type:"Exam"},
  {id:16, genre:"Article", marks:50, title:"Promotional article \u2014 Rentals for Writers (property magazine)", statement:"Rentals for Writers", prompt:"You have been asked to write the text for a promotional article by the editor of a property magazine called, Rentals for Writers. Your article will be illustrated by the cartoon that appears above. In your promotional article you should: advertise the properties featured in the cartoon as inspirational venues in which to finish novels in particular genres, draw attention to previous literary successes associated with some of these properties, and detail any unique terms and conditions which will apply to particular properties. The article may be humorous or serious or both.", year:"2020", type:"Exam"},
  {id:17, genre:"Introduction", marks:50, title:"Introduction to a new collection of detective fiction", statement:"", prompt:"You have been asked to write the introduction to a new collection of contemporary detective fiction. In your introduction you should: outline the reasons why you think detective stories have enduring appeal, discuss some of the personal qualities you believe are essential in a memorable fictional detective, and explain why you recommend this particular collection of stories to readers.", year:"2020", type:"Exam"},
  {id:18, genre:"Speech / Talk", marks:50, title:"Speech to the alien powers \u2014 a plea to save humanity", statement:"", prompt:"Enlightened aliens, horrified by the injustice and inequality evident in human society, have decided to eliminate all human beings and recolonise Earth with more deserving inhabitants. You have been chosen to represent humanity and deliver a speech to the alien powers in which you try to save us from our fate. In your speech you should: acknowledge some of humanity's failings in relation to justice and inequality, point to evidence of the many admirable qualities of the human race, and explain why the aliens should believe we can be trusted to work together for a better future.", year:"2020", type:"Exam"},
  {id:19, genre:"Article", marks:50, title:"Opinion piece (broadsheet) \u2014 the varied virtues of sport", statement:"", prompt:"In TEXT 1, Jeanette Winterson extols the virtues of the arts, arguing that artistic activities are beneficial both for individuals and for society in general. She also gives her views on the relationship between art and money. Write an opinion piece, suitable for publication in a broadsheet newspaper, in which you: extol the varied virtues of sport, put forward a reasoned argument to persuade readers that sport benefits both individuals and society, and give your views on the appropriate relationship between sport and money.", year:"2019", type:"Exam"},
  {id:20, genre:"Diary / Reflection", marks:50, title:"Reflective journal entry \u2014 fleeing an uninhabitable Earth", statement:"", prompt:"Look at the photograph on page 5 and imagine you are fleeing Earth on the last spaceship evacuating the planet after human actions have made our world uninhabitable. Write a reflective journal entry, which you hope will be preserved for future generations. In it you should: criticise humanity's folly which resulted in the loss of our earthly home, share your personal memories of the planet, and celebrate some of Earth's former glories.", year:"2019", type:"Exam"},
  {id:21, genre:"Introduction", marks:50, title:"Introduction to a collection of essays in support of real shops", statement:"", prompt:"The expansion of online shopping has had a devastating effect on all types of real shops and department stores. Write an introduction to a collection of essays in support of real shops, in which you: celebrate the joys of 'real' shopping, explain what the presence of shops and shoppers brings to communities, and discuss some of the implications for us all of the ever-increasing popularity of online shopping.", year:"2019", type:"Exam"},
  {id:22, genre:"Letter", marks:50, title:"Open letter \u2014 to all who have offered you unwanted advice", statement:"", prompt:"Young people are often the recipients of unwanted advice. Write an open letter (a letter intended for a wide audience, often published online or in print) to all those who have ever offered you unwanted advice. In your letter you should: identify some nuggets of unwanted advice you have received, describe your response to receiving such advice, and share your opinion on how and when advice could be appropriately offered. Your letter may be amusing or serious or both.", year:"2018", type:"Exam"},
  {id:23, genre:"Article", marks:50, title:"Opinion piece (national newspaper) \u2014 your second-level education", statement:"", prompt:"The children in TEXT 2 experience an unconventional education. Based on your experience of second level education, write an opinion piece, suitable for publication in a national newspaper, in which you: acknowledge what you see as the strengths of the education you have received, criticise what you see as its weaknesses, and make suggestions for its improvement.", year:"2018", type:"Exam"},
  {id:24, genre:"Article", marks:50, title:"School website article \u2014 reading a text vs watching its film", statement:"", prompt:"Write an article for your school website, in which you consider the experience of reading a text and watching a film adaptation of the same text. In your article you should: identify at least one written text which has been adapted as a film, consider the advantages and disadvantages of each of these formats, and explain which format you would recommend as the way in which to experience the text(s) for the first time. You may refer to any text(s) of your choice in your answer.", year:"2018", type:"Exam"},
  {id:25, genre:"Article", marks:50, title:"School website article \u2014 displaying three course poems in your school", statement:"", prompt:"Your school Principal has agreed to your suggestion to display three poems, or extracts from three poems, on the 2017 Leaving Certificate Higher Level English poetry course, in your school. You have been asked to choose the poetry and decide how and where it will be displayed. Write an article for your school's website in which you: explain your choice of poetry, your ideas for its display, and the impact you hope this project will have on the school community.", year:"2017", type:"Exam"},
  {id:26, genre:"Article", marks:50, title:"Opinion piece (national newspaper) \u2014 relying on the online world for news", statement:"", prompt:"The views people hold today are often influenced by the news and information they receive from the online world of the internet and social media. Write an opinion piece, for publication in a national newspaper, in which you give your views on: the extent to which people today rely on the online world as a source of news and information, the reliability of these sources, and the impact of this development on society.", year:"2017", type:"Exam"},
  {id:27, genre:"Radio / Podcast", marks:50, title:"Radio programme \u2014 Reflections on the World of Childhood", statement:"Reflections on the World of Childhood", prompt:"You have been asked to participate in a radio programme entitled Reflections on the World of Childhood. Write the text to be broadcast on radio, in which you: reflect on the world of your childhood, discuss what captured your childish imagination, and recall a selection of the songs or sounds or stories that live on in your memory.", year:"2017", type:"Exam"},
  {id:28, genre:"Speech / Talk", marks:50, title:"Adjudicator's speech \u2014 poster competition for The Comedy of Errors", statement:"", prompt:"Imagine that you are the adjudicator for a poster competition; entries must promote a production of Shakespeare's play, The Comedy of Errors, to a contemporary audience. The entries on Page 2 represent the finalists in the competition. Write a speech in which you announce the first and second prize winners. In your speech you should: explain your judgement, commenting on the visual appeal of the first and second prize winning entries and their effectiveness in promoting a production of this Shakespearean play to a contemporary audience.", year:"2016", type:"Exam"},
  {id:29, genre:"Proposal", marks:50, title:"Film-making competition entry \u2014 adapting spill simmer falter wither", statement:"", prompt:"Your Transition Year class has decided to enter a film-making competition. Entries must be based on an extract from a novel and portray aspects of contemporary Irish life. Your class's entry is based on the above extract from Sara Baume's novel, spill simmer falter wither. Write the text for your class's competition entry in which you: identify the elements in the above extract that you think make it suitable for filming, and outline the aspects of contemporary Irish life the passage portrays that you would like to capture in your film.", year:"2016", type:"Exam"},

  {id:31, genre:"Letter", marks:50, title:"Letter to the Principal \u2014 a case for a graduation ceremony", statement:"", prompt:"Your school Principal has decided not to hold any graduation ceremony for the Leaving Certificate Class of 2015. The school's Student Council disagrees with this decision. As Chairperson of the Student Council you have been asked to write a letter to the Principal, in which you: express the students' dissatisfaction with this decision and make a case for holding a graduation event. Write the letter you would submit to the Principal.", year:"2015", type:"Exam"},
  {id:32, genre:"Article", marks:50, title:"Website article \u2014 the characteristics of a genre, advice for young writers", statement:"", prompt:"The writing group, to which you belong, has decided to develop a website, aimed at aspiring young writers. You have been asked to contribute an article on one of the following genres: detective fiction; travel writing; humour; romance; autobiography; the short story. Write the article you would contribute, discussing at least two important characteristics of your chosen genre and offering advice to young people wishing to engage in this type of writing.", year:"2015", type:"Exam"},

  {id:34, genre:"Radio / Podcast", marks:50, title:"Radio news report \u2014 the disappearance of Dell Parsons", statement:"", prompt:"Imagine that the story of the disappearance of Dell Parsons, outlined in Text 1 above, has captured the public's imagination. You are a reporter with a national radio station. Write the text of a news report, on the Dell Parsons story, to be delivered on the station's main evening news bulletin. In your report you should: communicate the facts of the case as known (based on Text 1) and further speculate as to Dell's whereabouts and possible developments in the story.", year:"2014", type:"Exam"},
  {id:35, genre:"Speech / Talk", marks:50, title:"Talk to your class \u2014 the influences on young people's lives", statement:"", prompt:"The above text is based on a series of public lectures delivered by various writers on the topic of influence. Young people today are subject to many influences. Write the text of a talk you would deliver to your class in which you consider: some of the positive and negative influences on young people's lives today and how they respond to these influences.", year:"2014", type:"Exam"},

  {id:37, genre:"Speech / Talk", marks:50, title:"Talk to your class \u2014 Television and radio in the lives of young people", statement:"Television and radio in the lives of young people today", prompt:"You have been asked to give a talk to your class entitled: Television and radio in the lives of young people today. Write the text of the talk you would deliver, in which you consider the role of television and radio in the lives of young people today.", year:"2013", type:"Exam"},

  {id:39, genre:"Letter", marks:50, title:"Personal letter to Margaret Laurence \u2014 your home place", statement:"", prompt:"Write a letter to Margaret Laurence, in response to Text 1, commenting on: what you find interesting in the extract, and telling her about your home place and its impact on you.", year:"2012", type:"Exam"},
  {id:40, genre:"Proposal", marks:50, title:"Proposal \u2014 a person or event that should be commemorated", statement:"", prompt:"Write a proposal, to be submitted to the relevant authority (e.g. local council or national body), suggesting one event or person you believe should be commemorated. In your proposal you should: explain why you feel this person or event should be commemorated and suggest what form this commemoration might take.", year:"2012", type:"Exam"},
  {id:41, genre:"Article", marks:50, title:"Persuasive article (school website) \u2014 school outings and trips", statement:"", prompt:"Your school's Student Council is currently discussing the issue of school outings, educational trips, theatre visits, etc. Write a persuasive article for your school website supporting or opposing such events.", year:"2012", type:"Exam"},

/* ---------- helpers ---------- */
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function hexA(hex,a){const h=hex.replace('#','');const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);return `rgba(${r},${g},${b},${a})`;}
function gcolor(sec,group){const m=SECTIONS[sec].meta;return (m&&m[group]&&m[group].color)||SECTIONS[sec].accent;}
function gdesc(sec,group){const m=SECTIONS[sec].meta;return (m&&m[group]&&m[group].desc)||'';}
function qText(q){
  if(q.sec==='poetry') return (q.statement+' '+q.text+' '+q.group).toLowerCase();
  return ((q.title||'')+' '+(q.statement||'')+' '+q.text).toLowerCase();
}
function themeHit(q,t){const x=qText(q);return t.stems.some(s=>x.includes(s));}
function rank(q){return parseInt(q.year,10)*10+(q.type==='Exam'?1:0);}
function yearSpan(list){const ys=[...new Set(list.map(q=>+q.year))].sort((a,b)=>a-b);return ys[0]+'–'+ys[ys.length-1];}

function highlight(text){
  const safe=esc(text);
  if(!state.q)return safe;
  const terms=state.q.split(/\s+/).filter(Boolean).map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  if(!terms.length)return safe;
  return safe.replace(new RegExp('('+terms.join('|')+')','gi'),'<mark>$1</mark>');
}

  all.className='poet-pill allpill';all.dataset.group='all';
  all.setAttribute('aria-pressed', state.groups.size===0?'true':'false');
  const total=DATA.composing.length+DATA.questionb.length+DATA.poetry.filter(q=>q.prescribed).length;
  all.innerHTML=`<span>All sections</span><span class="tag">${total}</span>`;
  all.addEventListener('click',()=>{state.groups.clear();refreshPills();render();});
  poetsEl.appendChild(all);
  SECORDER.forEach(sec=>{
    const S=SECTIONS[sec];
    const c = sec==='poetry'? DATA.poetry.filter(q=>q.prescribed).length : DATA[sec].length;
    const b=document.createElement('button');b.className='poet-pill';b.dataset.group=sec;
    b.setAttribute('aria-pressed', state.groups.has(sec)?'true':'false');
    b.innerHTML=`<span class="gdot" style="background:${S.accent}"></span><span>${S.short}</span><span class="tag">${c}</span>`;
    b.addEventListener('click',()=>{state.groups.has(sec)?state.groups.delete(sec):state.groups.add(sec);refreshPills();render();});
    poetsEl.appendChild(b);
  });
}
function refreshPills(){
  const sel=document.getElementById('groupSelect');
  if(sel){
    sel.value = state.groups.size ? [...state.groups][0] : '';
    const box=sel.closest('.gselect'); if(box) box.setAttribute('data-active', state.groups.size?'true':'false');
  }
  [...poetsEl.children].forEach(c=>{
    const v=c.dataset.group; if(v===undefined) return;
    c.setAttribute('aria-pressed', v==='all' ? (state.groups.size===0?'true':'false') : (state.groups.has(v)?'true':'false'));
  });
}

/* ---------- extras (poetry other-poets switch) ---------- */
function buildExtras(){
  extrasEl.innerHTML='';
  if(state.sec!=='poetry'){extrasEl.hidden=true;return;}
  extrasEl.hidden=false;
  const sw=document.createElement('button');
  sw.className='switch';sw.id='otherToggle';
  sw.setAttribute('aria-pressed',state.includeOther?'true':'false');
  sw.innerHTML=`<span class="track"></span><span class="swlabel"><span class="lbl">Other poets</span><span class="hint">include poets not on your current list</span></span>`;
  sw.addEventListener('click',()=>{
    state.includeOther=!state.includeOther;
    sw.setAttribute('aria-pressed',state.includeOther?'true':'false');
    if(!state.includeOther){[...state.groups].forEach(g=>{ if(!DATA.poetry.some(q=>q.group===g&&q.prescribed)) state.groups.delete(g); });}
    buildPills();buildThemes();render();
  });
  extrasEl.appendChild(sw);
}

/* ---------- theme chips ---------- */
themesToggle.addEventListener('click',(e)=>{e.stopPropagation();const open=themesEl.hidden;themesEl.hidden=!open;themesToggle.setAttribute('aria-expanded',open?'true':'false');});
themesEl.addEventListener('click',e=>e.stopPropagation());
document.addEventListener('click',()=>{if(!themesEl.hidden){themesEl.hidden=true;themesToggle.setAttribute('aria-expanded','false');}});
function updateThemeCount(){if(state.themes.size){themeCount.hidden=false;themeCount.textContent=state.themes.size;}else themeCount.hidden=true;}
function themeBasePool(){
  return curData().filter(q=>{
    if(!inPool(q)) return false;
    if(state.groups.size && !state.groups.has(q.group)) return false;
    if(state.q){const hay=qText(q)+' '+q.year;if(!state.q.toLowerCase().split(/\s+/).every(t=>hay.includes(t))) return false;}
    return true;
  });
}
function buildThemes(){
  if(isAll())return;
  const THEMES=SECTIONS[state.sec].themes;
  const pool=themeBasePool();
  [...state.themes].forEach(lbl=>{const t=THEMES.find(x=>x.label===lbl);if(!t||!pool.some(q=>themeHit(q,t)))state.themes.delete(lbl);});
  themesEl.innerHTML='';let shown=0;
  THEMES.forEach(t=>{
    const c=pool.filter(q=>themeHit(q,t)).length;if(!c)return;shown++;
    const b=document.createElement('button');b.className='theme-chip';b.dataset.theme=t.label;
    b.setAttribute('aria-pressed', state.themes.has(t.label)?'true':'false');
    b.innerHTML=`${esc(t.label)}<span class="n">${c}</span>`;
    b.addEventListener('click',()=>{state.themes.has(t.label)?state.themes.delete(t.label):state.themes.add(t.label);b.setAttribute('aria-pressed',state.themes.has(t.label)?'true':'false');updateThemeCount();render();});
    themesEl.appendChild(b);
  });
  if(!shown)themesEl.innerHTML='<span style="font-size:12px;color:var(--muted);padding:2px 4px;">No themes for this selection</span>';
  updateThemeCount();
}

/* ---------- control visibility per mode ---------- */
function configureControls(){

function buildDecks(){

/* ---------- sort + progress segments ---------- */
function setSeg(id,key,val){document.querySelectorAll('#'+id+' button').forEach(b=>b.setAttribute('aria-pressed',b.dataset[key]===val?'true':'false'));}
function bindSeg(id,key){document.querySelectorAll('#'+id+' button').forEach(btn=>btn.addEventListener('click',()=>{state[key]=btn.dataset[key];setSeg(id,key,state[key]);render();}));}
bindSeg('sortSeg','sort');
bindSeg('progSeg','prog');

/* ---------- search ---------- */
searchEl.addEventListener('input',()=>{state.q=searchEl.value.trim();if(!isAll())buildThemes();render();});

/* ---------- matching ---------- */
function matches(q){
  if(!inPool(q)) return false;
  if(state.groups.size && !state.groups.has(q.group)) return false;
  if(state.prog==='done' && !isDone(q)) return false;
  if(state.prog==='todo' && isDone(q)) return false;
  if(state.themes.size){const ts=SECTIONS[state.sec].themes.filter(t=>state.themes.has(t.label));if(!ts.some(t=>themeHit(q,t)))return false;}
  if(state.q){const hay=qText(q)+' '+q.year;return state.q.toLowerCase().split(/\s+/).every(t=>hay.includes(t));}
  return true;
}
function matchesAll(q){
  if(q.sec==='poetry' && !q.prescribed) return false;
  if(state.groups.size && !state.groups.has(q.sec)) return false;
  if(state.prog==='done' && !isDone(q)) return false;
  if(state.prog==='todo' && isDone(q)) return false;
  if(state.q){const hay=qText(q)+' '+q.year;return state.q.toLowerCase().split(/\s+/).every(t=>hay.includes(t));}
  return true;
}

/* ---------- render ---------- */
function render(){ isAll()?renderAll():renderSection(); }

function renderSection(){
  const S=SECTIONS[state.sec];
  const dir = state.sort==='newest' ? -1 : 1;
  const filtered=curData().filter(matches);
  resultsEl.innerHTML='';
  const totalPool=curData().filter(inPool).length;
  resultline.innerHTML=`Showing <b>${filtered.length}</b> of ${totalPool} questions`
    +(state.groups.size?` &middot; <b>${[...state.groups].map(esc).join(', ')}</b>`:'')
    +(state.prog!=='all'?` &middot; ${state.prog==='done'?'done':'to do'}`:'')
    +(state.themes.size?` &middot; themes: <b>${[...state.themes].map(esc).join(', ')}</b>`:'')
    +(state.includeOther?` &middot; incl. other poets`:'')
    +(state.q?` &middot; matching &ldquo;${esc(state.q)}&rdquo;`:'');
  if(!filtered.length){
    resultsEl.innerHTML='<div class="empty"><strong>No questions match.</strong>Try a different keyword or clear the filters.</div>';
    return;
  }
  const groups = S.groupKind==='genre'
    ? S.order.filter(g=>filtered.some(q=>q.group===g))
    : activeGroups().filter(g=>filtered.some(q=>q.group===g));
  groups.forEach(g=>{
    const items=filtered.filter(q=>q.group===g).sort((x,y)=>(rank(x)-rank(y))*dir);
    const gc=gcolor(state.sec,g);
    const sec=document.createElement('section');
    sec.className='poet-group';sec.style.setProperty('--gc',gc);
    sec.innerHTML=`<div class="group-head"><h2>${esc(g)}</h2><span class="rule"></span><span class="cnt">${items.length}</span></div>`
      + (gdesc(state.sec,g)?`<p class="group-desc">${esc(gdesc(state.sec,g))}</p>`:'');
    const grid=document.createElement('div');grid.className='grid';
    items.forEach(q=>grid.appendChild(card(q)));
    sec.appendChild(grid);resultsEl.appendChild(sec);
  });
}

function renderAll(){
  const dir = state.sort==='newest' ? -1 : 1;
  resultsEl.innerHTML='';
  let shownSecs=SECORDER.filter(sec=>!state.groups.size||state.groups.has(sec));
  let total=0;
  const blocks=shownSecs.map(sec=>{
    const items=DATA[sec].filter(matchesAll).filter(q=>q.sec===sec).sort((x,y)=>(rank(x)-rank(y))*dir);
    total+=items.length;return {sec,items};
  });
  resultline.innerHTML=`Showing <b>${total}</b> questions across ${shownSecs.length===1?'1 section':shownSecs.length+' sections'}`
    +(state.groups.size?` &middot; <b>${[...state.groups].map(s=>SECTIONS[s].short).join(', ')}</b>`:'')
    +(state.prog!=='all'?` &middot; ${state.prog==='done'?'done':'to do'}`:'')
    +(state.q?` &middot; matching &ldquo;${esc(state.q)}&rdquo;`:'');
  if(!total){
    resultsEl.innerHTML='<div class="empty"><strong>No questions match.</strong>Try a different keyword or clear the section filters.</div>';
    return;
  }
  blocks.forEach(({sec,items})=>{
    if(!items.length)return;
    const S=SECTIONS[sec];
    const wrap=document.createElement('section');wrap.className='sec-group';wrap.style.setProperty('--sc',S.accent);
    wrap.innerHTML=`<div class="secband" style="--sc:${S.accent}"><div><div class="meta">${S.paper} · ${S.marksLabel}</div><h2>${S.tab}</h2></div><span class="cnt">${items.length}</span></div>`;
    const grid=document.createElement('div');grid.className='grid';
    items.forEach(q=>grid.appendChild(card(q)));
    wrap.appendChild(grid);resultsEl.appendChild(wrap);
  });
}

}

/* ---------- study panels ---------- */
function genreStudy(q){
  const S=SECTIONS[q.sec];const g=S.guide[q.group];if(!g)return '';
  let h='';
  h+=`<div class="ssec"><h4>What examiners reward · ${esc(q.group)}</h4><ul class="squotes">${g.rewards.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`;
  h+=`<div class="ssec"><h4>How to approach it</h4><ul class="sscheme">${g.approach.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`;
  const tot=S.pclm.reduce((a,p)=>a+parseInt(p[2],10),0);
  h+=`<div class="ssec"><h4>Marked out of ${tot} (PCLM)</h4><div class="pclm">${S.pclm.map(p=>`<span class="pc">${p[1]} <b>${p[2]}</b></span>`).join('')}</div></div>`;
  return h;
}
function poetryStudy(q){
  const poems=PO_POEMS_BY_POET[q.group]||[];
  if(!poems.length)return '';
  return `<div class="ssec"><h4>Poems &amp; video walkthroughs · ${esc(q.group)}</h4><ul class="spoems">${poems.map(p=>p.url?`<li><a href="${esc(p.url)}" target="_blank" rel="noopener">${esc(p.title)}</a></li>`:`<li>${esc(p.title)}</li>`).join('')}</ul></div>`;
}

/* ---------- done toggle ---------- */
function toggleDone(q,btn,cardEl,verb){
  const set=done[q.sec];
  const nowDone=!set.has(q.rid);
  nowDone?set.add(q.rid):set.delete(q.rid);
  saveDone(q.sec);
  btn.classList.toggle('done',nowDone);
  btn.lastChild.textContent=nowDone?(verb==='written'?'Written':'Done'):(verb==='written'?'Mark written':'Mark done');
  cardEl.classList.toggle('is-done',nowDone);
  if(state.prog!=='all')render();
}

/* ---------- plan scaffolds ---------- */
function planPiece(q){
  if(q.sec==='poetry'){
    const stmt=q.statement?`STATEMENT: "${q.statement}"\n`:'';
    const scaffold=`${q.group.toUpperCase()} — ${q.year} ${q.type}\n${stmt}TASK: ${q.text}\n\nPOETRY ESSAY — PLAN\n• Key terms in the question (underline them):\n• My overall line of argument (a clear stance):\n• Poem 1 — point + quote + analysis:\n• Poem 2 — point + quote + analysis:\n• Poem 3 — point + quote + analysis:\n• Poem 4 — point + quote + analysis:\n• Recurring style features (imagery, tone, language, form):\n• Conclusion — return to the question, sum up your response:`;
    copyText(scaffold,'Poetry-essay plan copied — paste it into your notes');
    return;
  }
  const S=SECTIONS[q.sec];
  let body;
  if(S.scaffolds && S.scaffolds[q.group]) body=S.scaffolds[q.group];
  else {
    const g=(S.guide||{})[q.group];
    const steps=g?g.approach.map(x=>'• '+x).join('\n'):'• Plan your opening, three developed points, and a deliberate close.';
    body=`${q.group.toUpperCase()} — PLAN\n${steps}`;
  }
  const scaffold=`${q.year} ${q.group.toUpperCase()} — ${q.text}\n\n${body}`;
  copyText(scaffold,'Planning scaffold copied — paste it into your notes');
}

/* ---------- copy ---------- */
function copyQ(q){
  let text;
  if(q.sec==='poetry'){
    const stmt=q.statement?`"${q.statement}"\n`:'';
    text=`${stmt}${q.text}\n— ${q.group} · ${q.year} ${q.type}`;
  }else{
    text=`${q.text}\n— ${q.year} State Exam · ${q.group} · ${q.marks} marks`;
  }
  copyText(text,'Question copied');
}
function copyText(text,msg){
  const fb=()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}ta.remove();toast(msg);};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(()=>toast(msg),fb);}else fb();
}

/* ---------- print + copy list ---------- */
document.getElementById('printBtn').addEventListener('click',()=>window.print());
document.getElementById('copyAllBtn').addEventListener('click',()=>{
  let vis;
  if(isAll()) vis=SECORDER.flatMap(sec=>DATA[sec].filter(matchesAll).filter(q=>q.sec===sec));
  else vis=curData().filter(matches);
  vis=vis.sort((a,b)=>rank(b)-rank(a));
  if(!vis.length){toast('Nothing to copy');return;}
  const text=vis.map(q=>{
    const head=`${q.year} · ${SECTIONS[q.sec].short} · ${q.group}`;
    const stmt=q.statement?`"${q.statement}"\n`:'';
    return `${head}\n${stmt}${q.text}`;
  }).join('\n\n');
  copyText(text, vis.length+' questions copied');
});

/* ---------- trackers ---------- */
trackerBtn.addEventListener('click',()=>{
  const open=trackerPanel.hidden;
  if(open) buildTracker();
  trackerPanel.hidden=!open;
  trackerBtn.setAttribute('aria-expanded',open?'true':'false');
  if(open)trackerPanel.scrollIntoView({behavior:'smooth',block:'nearest'});
});
function buildTracker(){
  if(isAll())return;
  SECTIONS[state.sec].trackerKind==='poet'?buildPoetTracker():buildFormTracker();
}
function buildFormTracker(){
  const S=SECTIONS[state.sec];
  const data=DATA[state.sec];
  const years=[...new Set(data.map(q=>+q.year))].sort((a,b)=>a-b);
  const YEARS=[];for(let y=years[0];y<=years[years.length-1];y++)YEARS.push(String(y));
  const groups=S.order.filter(g=>data.some(q=>q.group===g));
  const ncol=`130px 60px repeat(${YEARS.length},1fr)`;
  document.getElementById('trackerHead').innerHTML=`${S.trackerLabel} <span class="tnote">how often each ${state.sec==='questionb'?'form':'genre'} has come up · ${YEARS[0]}–${YEARS[YEARS.length-1]}</span>`;
  document.getElementById('trackerLegend').innerHTML=`<span><span class="key" style="background:#f3f1ec"></span>not set that year</span> <span><span class="key" style="background:var(--acc)"></span>appeared (number = how many)</span>`;
  const ins=document.getElementById('trackerInsight');ins.hidden=false;
  ins.innerHTML = state.sec==='questionb'
    ? `<b>Article</b>, <b>Letter</b> and <b>Speech / Talk</b> dominate Question B — prepare those three rock-solid first, then bank a strong fourth and fifth form for real choice on the day. You write only <b>one</b> Question B, for 50 marks.`
    : `<b>Short story</b>, <b>Personal essay</b>, <b>Discursive essay</b>, <b>Speech</b> and <b>Article</b> appear most years — these are your safest bets. You write only <b>one</b> composition, for 100 marks, so prepare two or three genres deeply rather than all seven thinly.`;
  let html=`<div class="tgrid"><div class="trow head" style="grid-template-columns:${ncol}"><div class="pname">${state.sec==='questionb'?'Form':'Genre'}</div><div class="pstat">Years</div>`
    + YEARS.map(y=>`<div class="tcell">'${y.slice(2)}</div>`).join('') + '</div>';
  groups.forEach(g=>{
    const byYear={};YEARS.forEach(y=>byYear[y]=data.filter(q=>q.group===g&&q.year===y).length);
    const seen=YEARS.filter(y=>byYear[y]>0).length;
    const every=seen===YEARS.length;
    const gc=gcolor(state.sec,g);
    const cells=YEARS.map(y=>{
      const n=byYear[y];
      const bg=n? hexA(gc, n>=2?1:0.78) : '#f3f1ec';
      return `<div class="tcell" style="background:${bg};color:${n?'#fff':'transparent'}" title="${y}: ${n}">${n||''}</div>`;
    }).join('');
    html+=`<div class="trow" style="grid-template-columns:${ncol}"><div class="pname"><span class="gdot" style="background:${gc}"></span>${esc(g)}</div><div class="pstat${every?' every':''}"><b>${seen}</b>/${YEARS.length}${every?' ✓':''}</div>${cells}</div>`;
  });
  html+='</div>';
  document.getElementById('trackerBody').innerHTML=html;
}
function buildPoetTracker(){
  const YEARS=[];for(let y=2010;y<=2026;y++)YEARS.push(String(y));
  const ncol=`130px 96px repeat(${YEARS.length},1fr)`;
  document.getElementById('trackerHead').innerHTML=`Exam appearance tracker <span class="tnote">your prescribed poets · 2010–2026</span>`;
  document.getElementById('trackerLegend').innerHTML=`<span><span class="key app"></span>appeared on the exam</span> <span><span class="key pres"></span>prescribed, not examined</span> <span><span class="key off"></span>not on the list</span>`;
  const ins=document.getElementById('trackerInsight');ins.hidden=false;
  ins.innerHTML=`Cells filled in <b>red</b> mark the years a poet was actually examined. A poet flagged <b>due</b> hasn’t appeared in three or more years — historically a signal worth weighing when you choose which poets to prepare in depth.`;
  let html=`<div class="tgrid"><div class="trow head" style="grid-template-columns:${ncol}"><div class="pname">Poet</div><div class="pstat">Last seen</div>`
    + YEARS.map(y=>`<div class="tcell">'${y.slice(2)}</div>`).join('') + '</div>';
  Object.keys(PO_PRESCRIBED_KEY).forEach(poet=>{
    const key=PO_PRESCRIBED_KEY[poet];
    const appeared=new Set(DATA.poetry.filter(q=>q.group===poet&&q.type==='Exam').map(q=>q.year));
    const last=Math.max(...[...appeared].map(Number),0);
    const gap=2026-last;const due=gap>=3;
    const cells=YEARS.map(y=>{
      const pres=(PO_PRESCRIBED_BY_YEAR[y]||[]).includes(key);
      const app=appeared.has(y);
      return `<div class="tcell ${app?'app':(pres?'pres':'')}" title="${y}: ${app?'appeared':(pres?'prescribed, not examined':'not on list')}"></div>`;
    }).join('');
    const stat=last?`<b>${last}</b>${due?' · due':''}`:'—';
    html+=`<div class="trow" style="grid-template-columns:${ncol}"><div class="pname">${esc(poet)}</div><div class="pstat${due?' due':''}">${stat}</div>${cells}</div>`;
  });
  html+='</div>';
  document.getElementById('trackerBody').innerHTML=html;
}

/* ---------- toast ---------- */
let toastT;const toastEl=document.getElementById('toast');
function toast(msg){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('show'),1700);}

/* ---------- timer ---------- */
let total=50*60,left=total,tick=null;
const clock=document.getElementById('clock'),tStart=document.getElementById('tStart');
function fmt(s){const m=Math.floor(s/60),x=s%60;return `${String(m).padStart(2,'0')}:${String(x).padStart(2,'0')}`;}
function paint(){clock.textContent=fmt(left);timerEl.classList.toggle('low',left<=120);}
function resetTimer(){
  if(isAll())return;
  if(tick){clearInterval(tick);tick=null;tStart.textContent='▶';}
  total=SECTIONS[state.sec].timer*60;left=total;
  timerhint.innerHTML=SECTIONS[state.sec].timerLabel;
  paint();
}
function startPause(){
  if(tick){clearInterval(tick);tick=null;tStart.textContent='▶';return;}
  tStart.textContent='❚❚';
  tick=setInterval(()=>{left--;paint();if(left<=0){clearInterval(tick);tick=null;tStart.textContent='▶';toast('Time! Pens down.');}},1000);
}
tStart.addEventListener('click',startPause);
document.getElementById('tReset').addEventListener('click',()=>{if(tick){clearInterval(tick);tick=null;tStart.textContent='▶';}left=total;paint();});

/* ---------- section switch ---------- */
function setSection(sec){
  state.sec=sec; state.groups.clear(); state.themes.clear(); state.includeOther=false;
  state.q=''; searchEl.value='';
  state.prog='all'; setSeg('progSeg','prog','all');
  refreshSwitcher();
  updateMasthead();
  buildCounts();
  configureControls();
  buildPills();
  if(!isAll()){ buildThemes(); buildExtras(); resetTimer(); }
  trackerPanel.hidden=true; trackerBtn.setAttribute('aria-expanded','false');
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ---------- boot ---------- */
buildSwitcher();
setSection('all');
</script>
